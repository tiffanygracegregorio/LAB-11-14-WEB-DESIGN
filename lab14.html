<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Multimedia Sample</title>
<style>
body{
  background-color: pink;
  font-family: Arial, sans-serif;
  font-weight: bold;
  display: flex;
  justify-content: center;
  padding: 40px 0;
  margin: 0;
}
.box{
  background: white;
  padding: 30px;
  border-radius: 15px;
  width: 500px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.2);
  text-align: center;
}
h2{
  color: deeppink;
  margin-top: 20px;
}
hr{
  border: none;
  border-top: 2px solid pink;
  margin: 25px 0;
}
</style>
</head>
<body>

<div class="box">
<h2>Video</h2>
<video width="320" height="240" controls>
  <source src="mee.jpg" type="video/mp4">
  <source src="mee.jpg" type="video/ogg">
  Your browser does not support the video tag.
</video>

<hr>

<h2>Audio</h2>
<audio controls>
  <source src="audio.mp3" type="audio/mp3">
  <source src="audio.ogg" type="audio/ogg">
  Your browser does not support the audio element.
</audio>

<hr>

<h2>Object</h2>
<object width="100%" height="300px" data="favorite person.jpg"></object>

<hr>

<h2>Embed</h2>
<embed width="300px" height="300px" src="TIFFANY BIGO.jpg">

<hr>

<h2>Youtube</h2>
<iframe width="420" height="345" src="LOVEISCOLORBLIND.jpg"></iframe>

</div>
</body>
</html>
